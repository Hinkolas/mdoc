<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}} — mdoc</title>
    <link rel="stylesheet" href="/_/ui/preview.css" />
    <script src="/_/ui/preview.js" defer></script>
</head>

<body>
    <header>
        <div class="left">
            <span class="brand">mdoc</span>
            <span class="sep"></span>
            <span class="title" title="{{.Title}}">{{.Title}}</span>
        </div>
        <nav>
            <button id="btn-reload" class="ghost" title="Re-render from disk">
                <span class="label">Reload</span>
            </button>
            <button id="btn-print" class="primary" title="Download PDF">
                <span class="label">Print</span>
            </button>
        </nav>
    </header>
    <main>
        <iframe id="frame" src="/preview" title="Preview" allow="fullscreen"></iframe>
    </main>
    <div id="status" data-state="idle"></div>
</body>

</html>
