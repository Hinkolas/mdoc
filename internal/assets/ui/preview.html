<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}} — mdoc</title>
    <link rel="stylesheet" href="/_/ui/preview.css" />
    <link rel="stylesheet" href="/_/vendor/katex/katex.min.css" />
    <script src="/_/vendor/paged.polyfill.min.js" defer></script>

        <nav>
