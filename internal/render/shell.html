<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <base href="{{.BaseHref}}" />
    {{.HeadInject}}
    <link rel="stylesheet" href="{{.VendorBase}}/katex/katex.min.css" />
    <script src="{{.VendorBase}}/paged.min.js"></script>
    <script src="{{.VendorBase}}/katex/katex.min.js"></script>
    <script src="{{.VendorBase}}/katex/auto-render.min.js"></script>
    <style>
        /* Viewer chrome for on-screen preview. Wrapped in @media screen so
           none of it affects the PDF — Chromium's printToPDF emulates print
           media, under which these rules go away and each .pagedjs_page is
           captured as its own clean PDF page (PreferCSSPageSize honors the
           @page sizes the theme defined). */
        @media screen {
            html, body {
                margin: 0;
                padding: 0;
                background: #2b2e34;
            }
            .pagedjs_pages {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
                padding: 24px 0;
            }
            .pagedjs_page {
                background: #ffffff;
                box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
            }
        }
    </style>
</head>
<body>
    <template id="mdoc-source">{{.ThemedHTML}}</template>
    <div id="mdoc-pages"></div>
    <script>
        (function () {
            // The currently-visible pages container. Replaced wholesale on
            // each re-pagination via an atomic swap (see below).
            let target = document.getElementById("mdoc-pages");
            // Stylesheets we handed to paged.js on the last run; kept so we
            // can revoke their blob URLs once the next render has taken
            // their place and they're no longer referenced.
            let activeSheets = [];
            // Sequence counter so overlapping calls discard stale results
            // instead of fighting over the visible DOM.
            let seq = 0;
            // Only the preview iframe needs viewport-fit scaling. The
            // print pipeline loads this same shell.html in a top-level
            // headless tab whose default viewport (800px) is narrower
            // than an A4 page (~794px), so applying zoom there would
            // shrink the captured PDF by a few percent.
            const inPreview = window !== window.top;

            // Natural (un-zoomed) width of a page in px, computed once per
            // paginate so resize handling doesn't have to round-trip through
            // a zoom reset to re-measure.
            let pageNaturalWidth = 0;

            // Fit the rendered pages to the viewport: shrink the body via
            // CSS zoom when the page is wider than the available width,
            // leave it alone when it fits. Using zoom (not transform:scale)
            // means layout follows the visual size — no phantom scrollbars
            // or empty gaps where the un-scaled box used to be.
            function fitToViewport() {
                if (!inPreview) return;
                if (!pageNaturalWidth) {
                    const page = target.querySelector(".pagedjs_page");
                    if (!page) return;
                    // Make sure measurement isn't being skewed by an
                    // existing zoom from a previous fit.
                    document.body.style.zoom = "";
                    pageNaturalWidth = page.getBoundingClientRect().width;
                }
                const gutter = 24; // breathing room on each side
                const avail = window.innerWidth - gutter * 2;
                const scale = Math.min(1, avail / pageNaturalWidth);
                document.body.style.zoom = scale === 1 ? "" : String(scale);
            }

            if (inPreview) {
                window.addEventListener("resize", () => {
                    // requestAnimationFrame coalesces the burst of resize
                    // events the browser fires while the user drags a window.
                    requestAnimationFrame(fitToViewport);
                });
            }

            async function paginate(html) {
                const mySeq = ++seq;
                const scrollY = window.scrollY;
                // Page geometry may have changed (different @page size,
                // new theme); force a fresh measurement on the next fit.
                pageNaturalWidth = 0;

                const staging = document.createElement("div");
                staging.innerHTML = html;

                // Extract theme stylesheets into blob URLs and feed them
                // to Previewer.preview() as the explicit `stylesheets`
                // arg. Paged.js's Polisher only reads @page rules from
                // there.
                const sheetURLs = [];
                staging.querySelectorAll("style").forEach(s => {
                    const blob = new Blob([s.textContent], { type: "text/css" });
                    sheetURLs.push(URL.createObjectURL(blob));
                    s.remove();
                });
                staging.querySelectorAll("link[rel='stylesheet']").forEach(l => {
                    sheetURLs.push(l.href);
                    l.remove();
                });

                if (window.renderMathInElement) {
                    renderMathInElement(staging, {
                        // Stick to dollar delimiters: Goldmark treats \(
                        // and \[ as CommonMark backslash escapes and strips
                        // the slashes before KaTeX gets a chance to see
                        // them, so those forms can never reach this point.
                        // For a literal dollar sign in body text, escape
                        // as \$.
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                        ],
                        throwOnError: false,
                    });
                }

                // Double-buffer: paged.js paginates into a hidden sibling
                // (position:absolute pinned to body width so it gets real
                // layout; visibility:hidden so it never paints) while the
                // current pages stay visible. When the new layout is ready
                // we swap atomically in one synchronous tick — the browser
                // never sees an empty intermediate frame, so there's no
                // flash and scroll position is preserved automatically as
                // long as the content above the viewport didn't shift.
                const newTarget = document.createElement("div");
                newTarget.style.cssText =
                    "position: absolute; left: 0; right: 0; top: 0; " +
                    "visibility: hidden; pointer-events: none;";
                document.body.appendChild(newTarget);

                const previewer = new PagedModule.Previewer();
                try {
                    await previewer.preview(staging.innerHTML, sheetURLs, newTarget);
                } catch (err) {
                    newTarget.remove();
                    sheetURLs.forEach(u => URL.revokeObjectURL(u));
                    throw err;
                }

                if (mySeq !== seq) {
                    newTarget.remove();
                    sheetURLs.forEach(u => URL.revokeObjectURL(u));
                    return;
                }

                // Atomic swap in a single synchronous tick.
                const oldSheets = activeSheets;
                const old = target;
                newTarget.style.cssText = "";
                newTarget.id = "mdoc-pages";
                old.replaceWith(newTarget);
                target = newTarget;
                activeSheets = sheetURLs;
                oldSheets.forEach(u => URL.revokeObjectURL(u));

                // Re-apply the viewport fit now that real pages are in
                // the DOM and measurable. Done in rAF so layout has
                // settled before we read offsetWidth.
                requestAnimationFrame(fitToViewport);

                // Only restore scroll if the browser clamped it because
                // the new document is shorter (or content shifted enough
                // to perturb it). Most edits keep this branch silent.
                if (window.scrollY !== scrollY) {
                    requestAnimationFrame(() => window.scrollTo({ top: scrollY }));
                }
                return true;
            }

            // Expose for the parent SPA to call on file-change events; no
            // iframe reload needed, which means no flicker and the scroll
            // position is preserved.
            window.__mdocPaginate = paginate;

            // Route external link clicks through the preview server so they
            // open in the OS default browser instead of replacing the
            // iframe (which would strand the user — chromeless app windows
            // have no back button). Same-origin links keep their default
            // behavior so anchor jumps and internal navigation still work.
            // In a non-preview context (e.g. the print pipeline's headless
            // browser, which never receives clicks) the fetch just no-ops.
            document.addEventListener("click", function (e) {
                const a = e.target.closest && e.target.closest("a");
                if (!a || !a.href) return;
                let u;
                try { u = new URL(a.href, location.href); } catch (_) { return; }
                if (u.origin === location.origin) return;
                const scheme = u.protocol.toLowerCase();
                if (scheme !== "http:" && scheme !== "https:" && scheme !== "mailto:") return;
                e.preventDefault();
                fetch("/open-url", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: u.toString() }),
                    keepalive: true,
                }).catch(() => {});
            }, true);

            // Initial render: pull the inlined themed HTML out of the
            // <template> and paginate it. Resolves __mdocPagedDone so the
            // print pipeline knows when pages are ready for PDF capture.
            const tpl = document.getElementById("mdoc-source");
            window.__mdocPagedDone = paginate(tpl.innerHTML);
        })();
    </script>
</body>
</html>
