<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <base href="{{.BaseHref}}" />
    {{.HeadInject}}
    <link rel="stylesheet" href="{{.VendorBase}}/katex/katex.min.css" />
    <script src="{{.VendorBase}}/paged.min.js"></script>
    <script src="{{.VendorBase}}/katex/katex.min.js"></script>
    <script src="{{.VendorBase}}/katex/auto-render.min.js"></script>
    <style>
        /* Viewer chrome for on-screen preview. Wrapped in @media screen so
           none of it affects the PDF — Chromium's printToPDF emulates print
           media, under which these rules go away and each .pagedjs_page is
           captured as its own clean PDF page (PreferCSSPageSize honors the
           @page sizes the theme defined). */
        @media screen {
            html, body {
                margin: 0;
                padding: 0;
                background: #2b2e34;
            }
            .pagedjs_pages {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
                padding: 24px 0;
            }
            .pagedjs_page {
                background: #ffffff;
                box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
            }
        }
    </style>
</head>
<body>
    <template id="mdoc-source">{{.ThemedHTML}}</template>
    <div id="mdoc-pages"></div>
    <script>
        window.__mdocPagedDone = (async () => {
            const tpl = document.getElementById("mdoc-source");
            const target = document.getElementById("mdoc-pages");
            // Materialize the source so KaTeX can scan it before paged.js
            // computes per-page box sizes.
            const staging = document.createElement("div");
            staging.appendChild(tpl.content.cloneNode(true));
            // Extract theme stylesheets and pass them to Previewer.preview()
            // as the explicit `stylesheets` arg. Paged.js's Polisher only
            // reads @page rules from there — sheets that merely live in
            // <head> are ignored, and the engine falls back to Letter with
            // 1in margins.
            const sheetURLs = [];
            staging.querySelectorAll("style").forEach(s => {
                const blob = new Blob([s.textContent], { type: "text/css" });
                sheetURLs.push(URL.createObjectURL(blob));
                s.remove();
            });
            staging.querySelectorAll("link[rel='stylesheet']").forEach(l => {
                sheetURLs.push(l.href);
                l.remove();
            });
            if (window.renderMathInElement) {
                renderMathInElement(staging, {
                    delimiters: [
                        { left: "\\(", right: "\\)", display: false },
                        { left: "\\[", right: "\\]", display: true },
                        { left: "$$", right: "$$", display: true },
                    ],
                    throwOnError: false,
                });
            }
            const previewer = new PagedModule.Previewer();
            await previewer.preview(staging.innerHTML, sheetURLs, target);
            return true;
        })();
    </script>
</body>
</html>
