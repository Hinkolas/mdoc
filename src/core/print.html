<!doctype html>
<html>

<head>
    <title>{{.Title}}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["\\(", "\\)"]],
                displayMath: [["\\[", "\\]"]],
            },
            svg: {
                fontCache: "global",
            },
        };
    </script>
    <style>
        .math.display {
            overflow-x: auto;
            overflow-y: hidden;
        }
    </style>
</head>

<body>
    {{.Body}}
</body>

</html>
