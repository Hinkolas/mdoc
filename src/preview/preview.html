<!doctype html>
<html>

<head>
    <title>{{.Title}}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["\\(", "\\)"]],
                displayMath: [["\\[", "\\]"]],
            },
            svg: {
                fontCache: "global",
            },
        };
    </script>
    <style>
        .math.display {
            overflow-x: auto;
            overflow-y: hidden;
        }
    </style>

    <script src="https://unpkg.com/pagedjs/dist/paged.js"></script>
    <script>
        let ws = null;

        // WebSocket connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            ws = new WebSocket(wsUrl);

            ws.onopen = function () {
                console.log('WebSocket connected');
            };

            ws.onmessage = function (event) {
                const msg = JSON.parse(event.data);
                handleEvent(msg.event, msg.data);
            };

            ws.onclose = function () {
                console.log('WebSocket disconnected, reconnecting in 2s...');
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = function (err) {
                console.error('WebSocket error:', err);
            };
        }

        // Send event to server
        function sendEvent(event, data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const msg = { event: event };
                if (data !== undefined) {
                    msg.data = data;
                }
                ws.send(JSON.stringify(msg));
            } else {
                console.warn('WebSocket not connected');
            }
        }

        // Handle incoming events from server
        function handleEvent(event, data) {
            switch (event) {
                case 'source_changed':
                    console.log('Source file changed');
                    break;
                case 'render_result':
                    const container = document.querySelector('#preview');
                    container.innerHTML = '';
                    // Create a new Previewer for each render (paged.js doesn't handle re-renders well)
                    const previewer = new Paged.Previewer();
                    previewer.preview(data.html, [], container).then(() => {
                        console.log('Render complete');
                    }).catch(err => {
                        console.error('Render error:', err);
                    });
                    break;
                default:
                    console.log('Unknown event:', event);
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const body = document.body;
            const container = document.querySelector('#preview');
            const toggleButton = document.getElementById('toggle-sidebar');
            const renderButton = document.getElementById('render');

            // Connect WebSocket
            connectWebSocket();

            // Toggle sidebar
            toggleButton.addEventListener('click', function () {
                body.classList.toggle('aside-collapsed');
            });

            // Render button
            renderButton.addEventListener('click', function () {
                console.log('Requesting render...');
                sendEvent('render_request');
            });
        });
    </script>
    <style>
        .pagedjs_pages {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
            min-height: 100%;
        }

        .pagedjs_page {
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        @page {
            size: A4;
            margin: 3cm;
            padding: 0;
        }
    </style>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: auto 1fr;
            grid-template-areas:
                "header header"
                "main aside";
        }

        body.aside-collapsed {
            grid-template-columns: 1fr 0px;
        }

        header {
            grid-area: header;
            height: 56px;
            min-height: 56px;
            background: #1f2937;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 500;
        }

        #toggle-sidebar,
        #render {
            background: #374151;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        #toggle-sidebar:hover,
        #render:hover {
            background: #4b5563;
        }

        main {
            grid-area: main;
            overflow-y: auto;
            overflow-x: hidden;
            background: #525659;
            min-height: 0;
            height: 100%;
        }

        #sidepanel {
            grid-area: aside;
            width: 320px;
            overflow: auto;
            background: #f9fafb;
            border-left: 1px solid #e5e7eb;
            transition: width 0.3s ease, opacity 0.3s ease;
        }

        body.aside-collapsed #sidepanel {
            width: 0;
            opacity: 0;
            overflow: hidden;
            border-left: none;
        }
    </style>
</head>

<body class="aside-collapsed">
    <header>
        <span>{{.Title}}</span>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="toggle-sidebar">Toggle Sidebar</button>
            <button id="render">Render</button>
        </div>
    </header>
    <main id="preview">
        <!-- Preview of the document rendered by paged.js -->
    </main>
    <aside id="sidepanel">
        <!-- A collabsable side panel which will can be used to display various configuration options for the document
             depending on the selected operation (formatting options, page layout, color scheme, fonts etc.) -->
    </aside>
</body>

</html>
