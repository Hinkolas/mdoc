<style>
    @page {
        size: A4;
        margin: 2.5cm;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 11pt;
        line-height: 1.55;
        color: #111;
    }

    h1, h2, h3, h4, h5, h6 {
        font-weight: 600;
        line-height: 1.25;
        margin: 1.4em 0 0.4em;
    }

    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }
    h3 { font-size: 1.25em; }

    p { margin: 0 0 0.8em; }

    code {
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.92em;
        background: #f3f4f6;
        padding: 0.1em 0.35em;
        border-radius: 3px;
    }

    pre {
        background: #f3f4f6;
        padding: 12px 14px;
        border-radius: 4px;
        overflow: auto;
    }

    pre code { background: none; padding: 0; }

    table {
        border-collapse: collapse;
        width: 100%;
        margin: 1em 0;
    }

    th, td {
        border: 1px solid #d1d5db;
        padding: 6px 10px;
        text-align: left;
    }

    th { background: #f9fafb; }

    blockquote {
        border-left: 3px solid #d1d5db;
        margin: 0 0 1em;
        padding: 0.2em 1em;
        color: #4b5563;
    }
</style>

{{.Body}}
