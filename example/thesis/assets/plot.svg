<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300" font-family="Georgia, 'Times New Roman', serif" font-size="11">
  <!-- Simple harmonic-voltage plot used as a stand-in figure. -->
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <!-- grid -->
  <g stroke="#e3e3e3" stroke-width="1">
    <line x1="91"  y1="20" x2="91"  y2="280"/>
    <line x1="132" y1="20" x2="132" y2="280"/>
    <line x1="173" y1="20" x2="173" y2="280"/>
    <line x1="214" y1="20" x2="214" y2="280"/>
    <line x1="255" y1="20" x2="255" y2="280"/>
    <line x1="296" y1="20" x2="296" y2="280"/>
    <line x1="337" y1="20" x2="337" y2="280"/>
    <line x1="378" y1="20" x2="378" y2="280"/>
    <line x1="419" y1="20" x2="419" y2="280"/>
    <line x1="460" y1="20" x2="460" y2="280"/>
    <line x1="50" y1="40"  x2="460" y2="40"/>
    <line x1="50" y1="95"  x2="460" y2="95"/>
    <line x1="50" y1="205" x2="460" y2="205"/>
    <line x1="50" y1="260" x2="460" y2="260"/>
  </g>
  <!-- axes -->
  <g stroke="#000" stroke-width="1.2">
    <line x1="50" y1="20" x2="50" y2="280"/>
    <line x1="50" y1="150" x2="460" y2="150"/>
  </g>
  <!-- axis ticks / labels -->
  <g fill="#000" text-anchor="middle">
    <text x="50"  y="296">0</text>
    <text x="132" y="296">4</text>
    <text x="214" y="296">8</text>
    <text x="296" y="296">12</text>
    <text x="378" y="296">16</text>
    <text x="460" y="296">20</text>
  </g>
  <g fill="#000" text-anchor="end">
    <text x="44" y="44">300</text>
    <text x="44" y="99">100</text>
    <text x="44" y="154">0</text>
    <text x="44" y="209">−100</text>
    <text x="44" y="264">−300</text>
  </g>
  <text x="255" y="300" text-anchor="middle" font-style="italic">Zeit, t (in ms)</text>
  <text x="14" y="150" text-anchor="middle" font-style="italic" transform="rotate(-90 14 150)">Spannung, u(t) (in V)</text>
  <!-- sine (solid blue) -->
  <polyline fill="none" stroke="#1f77b4" stroke-width="1.8"
    points="50,150 70,116 91,85 112,61 132,45 153,40 173,45 194,61 214,85 235,116 255,150 276,184 296,215 317,239 337,255 358,260 378,255 399,239 419,215 440,184 460,150"/>
  <!-- cosine (dashed orange) -->
  <polyline fill="none" stroke="#d9602b" stroke-width="1.8" stroke-dasharray="6 4"
    points="50,40 70,45 91,61 112,85 132,116 153,150 173,184 194,215 214,239 235,255 255,260 276,255 296,239 317,215 337,184 358,150 378,116 399,85 419,61 440,45 460,40"/>
  <!-- legend -->
  <g transform="translate(64,52)">
    <rect x="0" y="0" width="120" height="44" fill="#ffffff" stroke="#000" stroke-width="0.8"/>
    <line x1="10" y1="15" x2="34" y2="15" stroke="#1f77b4" stroke-width="1.8"/>
    <text x="40" y="19">sinusförmig</text>
    <line x1="10" y1="33" x2="34" y2="33" stroke="#d9602b" stroke-width="1.8" stroke-dasharray="6 4"/>
    <text x="40" y="37">cosinusförmig</text>
  </g>
</svg>
